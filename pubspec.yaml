name: opentool_daemon
description: A HTTP Daemon Server to manage native OpenTool Servers.
version: 1.0.0
repository: https://github.com/opentool-hub/opentool-daemon

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  yaml: ^3.1.3
  json_annotation: ^4.9.0
  hive: ^2.2.3
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  dio: ^5.8.0+1
  crypto: ^3.0.6
  opentool_dart:
    path: ../opentool-dart
  logging: ^1.2.0
  archive: ^3.4.10

dev_dependencies:
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  test: ^1.25.0
